name: Update Macabets NFL Data

on:
  workflow_dispatch:
    inputs:
      season:
        description: "NFL season to refresh (leave blank for current season)"
        required: false
        type: string
  schedule:
    - cron: "20 10 * * 2"

permissions:
  contents: write

jobs:
  update-nfl-data:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Refresh NFL data
        run: |
          if [ -n "${{ github.event.inputs.season }}" ]; then
            python update_nfl_data.py --season "${{ github.event.inputs.season }}"
          else
            python update_nfl_data.py
          fi

      - name: Commit refreshed snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/nfl/team_snapshot.csv
          git diff --cached --quiet || git commit -m "Update NFL team snapshot"
          git push
