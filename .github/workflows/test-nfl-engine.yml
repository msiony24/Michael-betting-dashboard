name: Test NFL Engine

on:
  workflow_dispatch:
  push:
    paths:
      - "engine/nfl_team_quality.py"
      - "test_nfl_team_quality.py"
      - ".github/workflows/test-nfl-engine.yml"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
- name: Run NFL Engine Tests
  run: |
    python test_nfl_team_quality.py
    python test_nfl_ratings_loader.py
