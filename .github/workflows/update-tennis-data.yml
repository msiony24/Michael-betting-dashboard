name: Update Macabets Tennis Data

on:
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install requests
        run: pip install requests

      - name: Download ATP data
        run: python update_tennis_data.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "Update ATP data"
          git push
