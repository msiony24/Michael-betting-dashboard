name: Update Macabets Tennis Data

on:
  workflow_dispatch:
  schedule:
    - cron: "30 10 * * *"

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Check out Macabets
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install data requirements
        run: python -m pip install pandas openpyxl requests

      - name: Build ATP database
        run: python update_tennis_data.py

      - name: Commit ATP data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "ATP data is already current."
          else
            git commit -m "Update ATP match data"
            git push
          fi
